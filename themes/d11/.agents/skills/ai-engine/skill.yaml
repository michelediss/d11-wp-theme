name: ai-engine
description: Use this skill when a task depends on the canonical Markdown documentation of the current theme together with the integrated content-sync system. It must include and rely on docs/theme-overview.md, docs/block/block-availability-system.md, docs/block/block-composition-guide.md, docs/block/custom-blocks.md, docs/content-sync.md, and docs/skill-sync.md.
context:
  platform: wordpress
  owner: d11-theme
  theme: active-theme
runtime_notes:
  preferred_files:
    - docs/theme-overview.md
    - docs/block/block-availability-system.md
    - docs/block/block-composition-guide.md
    - docs/block/custom-blocks.md
    - docs/content-sync.md
    - docs/skill-sync.md
  resolution_rules:
    - Resolve the theme slug and text domain from style.css in the active theme.
    - Resolve the theme root from the active workspace instead of hardcoded absolute paths.
    - Resolve the theme-owned content root and inc/content-sync root from the active workspace instead of assuming a plugin-local layout.
