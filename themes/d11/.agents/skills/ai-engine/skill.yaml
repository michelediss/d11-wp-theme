name: ai-engine
description: Use this skill when a task depends on the canonical Markdown documentation of the current theme and its AI-assisted composition model. It must include and rely on all files in docs/: docs/theme-overview.md, docs/block/block-availability-system.md, docs/block/block-composition-guide.md, docs/block/custom-blocks.md, and docs/skill-sync.md.
context:
  platform: wordpress
  theme: active-theme
runtime_notes:
  preferred_files:
    - docs/theme-overview.md
    - docs/block/block-availability-system.md
    - docs/block/block-composition-guide.md
    - docs/block/custom-blocks.md
    - docs/skill-sync.md
  resolution_rules:
    - Resolve the theme slug and text domain from style.css in the active theme.
    - Resolve the theme root from the active workspace instead of hardcoded absolute paths.
