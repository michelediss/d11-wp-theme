name: Release Packages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: theme
            slug: d11
            path: wp-content/themes/d11
            version_file: wp-content/themes/d11/style.css
            tag_prefix: theme-d11-v
          - type: plugin
            slug: d11-maintenance
            path: wp-content/plugins/d11-maintenance
            version_file: wp-content/plugins/d11-maintenance/d11-maintenance.php
            tag_prefix: plugin-d11-maintenance-v
          - type: plugin
            slug: cf7-sync
            path: wp-content/plugins/cf7-sync
            version_file: wp-content/plugins/cf7-sync/cf7-sync.php
            tag_prefix: plugin-cf7-sync-v
          - type: plugin
            slug: simple-cookie-consent
            path: wp-content/plugins/simple-cookie-consent
            version_file: wp-content/plugins/simple-cookie-consent/simple-cookie-consent.php
            tag_prefix: plugin-simple-cookie-consent-v
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(grep -E '^(\s*\*\s*)?Version:' "${{ matrix.version_file }}" | head -n1 | sed -E 's/^(\s*\*\s*)?Version:\s*//')"
          if [[ -z "${VERSION}" ]]; then
            echo "Unable to resolve version from ${{ matrix.version_file }}" >&2
            exit 1
          fi

          TAG="${{ matrix.tag_prefix }}${VERSION}"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag already exists: ${TAG}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${{ matrix.slug }}.zip" >> "$GITHUB_OUTPUT"

      - name: Build package
        id: package
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist/package-root dist/out
          rsync -a \
            --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.DS_Store' \
            "${{ matrix.path }}/" "dist/package-root/${{ matrix.slug }}/"

          (
            cd dist/package-root
            zip -qr "../out/${{ steps.meta.outputs.zip_name }}" "${{ matrix.slug }}"
          )

          echo "asset_path=dist/out/${{ steps.meta.outputs.zip_name }}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "${{ steps.meta.outputs.tag }}" \
            "${{ steps.package.outputs.asset_path }}" \
            --title "${{ matrix.type }} ${{ matrix.slug }} v${{ steps.meta.outputs.version }}" \
            --notes "Automated release for \`${{ matrix.slug }}\` from \`${GITHUB_SHA}\`."
